<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="משימות">
<title>ניהול משימות</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f5f4f0;--surface:#ffffff;--surface2:#f0efeb;
  --text:#1a1a1a;--text2:#6b6b6b;--text3:#9b9b9b;
  --border:#e0dfd8;--border2:#cccbc3;
  --green-bg:#eaf3de;--green-text:#3b6d11;
  --amber-bg:#faeeda;--amber-text:#854f0b;
  --red-bg:#fcebeb;--red-text:#a32d2d;
  --blue-bg:#e6f1fb;--blue-text:#185fa5;
  --purple-bg:#eeedfe;--purple-text:#3c3489;
  --radius:10px;--radius-sm:7px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1a1a18;--surface:#242422;--surface2:#2e2e2b;
    --text:#f0efe8;--text2:#a0a09a;--text3:#6a6a65;
    --border:#3a3a36;--border2:#4a4a46;
    --green-bg:#1a2f10;--green-text:#8fc95a;
    --amber-bg:#2a1f0a;--amber-text:#f0a030;
    --red-bg:#2a1010;--red-text:#f07070;
    --blue-bg:#0a1a2a;--blue-text:#70adf0;
    --purple-bg:#1a1830;--purple-text:#a090f0;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}
.app{max-width:900px;margin:0 auto;padding:1rem}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.header h1{font-size:20px;font-weight:600}
.header-date{font-size:12px;color:var(--text2)}
.btn-new{padding:8px 16px;background:var(--text);color:var(--bg);border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px}
.btn-new:active{opacity:.8}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.25rem}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.75rem;text-align:center}
.stat-num{font-size:22px;font-weight:600;line-height:1}
.stat-lbl{font-size:11px;color:var(--text2);margin-top:4px}
.c-total{color:var(--text)}
.c-done{color:var(--green-text)}
.c-pend{color:var(--amber-text)}
.c-late{color:var(--red-text)}

/* Filters */
.filters{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.875rem;margin-bottom:1rem;display:flex;gap:8px;flex-wrap:wrap}
.filters input,.filters select{
  padding:8px 10px;border:1px solid var(--border2);border-radius:var(--radius-sm);
  font-size:13px;background:var(--surface2);color:var(--text);
  -webkit-appearance:none;appearance:none;min-width:0;
}
.filters input{flex:1;min-width:140px}
.filters select{flex:1;min-width:110px}

/* Table */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:10px 12px;text-align:right;font-weight:500;font-size:11px;color:var(--text2);background:var(--surface2);border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap;user-select:none}
th:hover{color:var(--text)}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
.overdue td{background:#fff8f8}
@media(prefers-color-scheme:dark){.overdue td{background:#2a1515}}
.date-late{color:var(--red-text);font-weight:500}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:500;white-space:nowrap;cursor:default}
.b-done{background:var(--green-bg);color:var(--green-text)}
.b-pend{background:var(--amber-bg);color:var(--amber-text)}
.b-agency{background:var(--blue-bg);color:var(--blue-text)}
.b-private{background:var(--purple-bg);color:var(--purple-text)}
.b-high{background:var(--red-bg);color:var(--red-text)}
.b-med{background:var(--amber-bg);color:var(--amber-text)}
.b-low{background:var(--green-bg);color:var(--green-text)}
.badge-toggle{cursor:pointer}
.badge-toggle:active{opacity:.7}

/* Actions */
.act{display:flex;gap:5px}
.btn-edit,.btn-del{padding:5px 9px;border-radius:var(--radius-sm);font-size:11px;cursor:pointer;border:1px solid var(--border2);background:var(--surface);color:var(--text);white-space:nowrap}
.btn-del{color:var(--red-text);border-color:transparent;background:transparent}
.btn-edit:active,.btn-del:active{opacity:.7}

/* Empty */
.empty{text-align:center;padding:2.5rem;color:var(--text2);font-size:14px}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:600px){.modal-bg{align-items:center}}
.modal{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;padding:1.5rem;width:100%;max-width:520px;max-height:92vh;overflow-y:auto}
@media(min-width:600px){.modal{border-radius:var(--radius);margin:1rem}}
.modal h2{font-size:18px;font-weight:600;margin-bottom:1.25rem}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;font-weight:500}
.form-row input,.form-row select,.form-row textarea{
  width:100%;padding:10px 12px;border:1px solid var(--border2);border-radius:var(--radius-sm);
  font-size:15px;background:var(--surface2);color:var(--text);
  -webkit-appearance:none;appearance:none;
}
.form-row textarea{height:80px;resize:vertical;font-family:inherit}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:400px){.form-grid{grid-template-columns:1fr}}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--border)}
.btn-save{padding:10px 22px;background:var(--text);color:var(--bg);border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer}
.btn-cancel{padding:10px 16px;background:transparent;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:14px;cursor:pointer;color:var(--text)}
.btn-save:active,.btn-cancel:active{opacity:.8}

/* Mobile: hide some columns */
@media(max-width:600px){
  .col-notes,.col-details,.col-priority{display:none}
  .stats{grid-template-columns:repeat(2,1fr)}
  th,td{padding:8px 8px}
  .badge{font-size:10px;padding:2px 6px}
}

/* Fab on mobile */
.fab{display:none;position:fixed;bottom:1.5rem;left:1.5rem;width:52px;height:52px;border-radius:50%;background:var(--text);color:var(--bg);font-size:26px;border:none;cursor:pointer;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.25);z-index:100}
@media(max-width:600px){.fab{display:flex}.btn-new{display:none}}
.fab:active{transform:scale(.95)}

/* Sort indicator */
.sort-asc::after{content:' ↑'}
.sort-desc::after{content:' ↓'}

/* Notes cell */
.notes-cell{max-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text2);font-size:12px}
.details-cell{max-width:150px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:12px}

/* Priority dot */
.pdot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-left:5px}
.pdot-h{background:#E24B4A}.pdot-m{background:#BA7517}.pdot-l{background:#639922}

/* Confirm delete */
.confirm-modal{background:var(--surface);border-radius:var(--radius);padding:1.5rem;width:90%;max-width:320px;text-align:center}
.confirm-modal p{margin-bottom:1.25rem;color:var(--text2);font-size:14px}
.confirm-modal h3{margin-bottom:.5rem;font-size:16px}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>ניהול משימות</h1>
    <div style="display:flex;align-items:center;gap:12px">
      <span class="header-date" id="hdate"></span>
      <button class="btn-new" onclick="openModal()">+ משימה חדשה</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-num c-total" id="s-total">0</div><div class="stat-lbl">סה"כ</div></div>
    <div class="stat"><div class="stat-num c-done" id="s-done">0</div><div class="stat-lbl">בוצעו</div></div>
    <div class="stat"><div class="stat-num c-pend" id="s-pend">0</div><div class="stat-lbl">ממתינות</div></div>
    <div class="stat"><div class="stat-num c-late" id="s-late">0</div><div class="stat-lbl">באיחור</div></div>
  </div>

  <div class="filters">
    <input type="text" id="q" placeholder="חיפוש לקוח, פרטים..." oninput="render()">
    <select id="fs" onchange="render()">
      <option value="">כל הסטטוסים</option>
      <option value="לא בוצע">לא בוצע</option>
      <option value="בוצע">בוצע</option>
    </select>
    <select id="ft" onchange="render()">
      <option value="">כל הסוגים</option>
      <option value="מכאן">מכאן</option>
      <option value="פרטי">פרטי</option>
    </select>
    <select id="fp" onchange="render()">
      <option value="">כל עדיפות</option>
      <option value="גבוה">גבוה</option>
      <option value="בינוני">בינוני</option>
      <option value="נמוך">נמוך</option>
    </select>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th onclick="sortBy('date')" id="th-date">תאריך</th>
          <th onclick="sortBy('client')" id="th-client">לקוח</th>
          <th onclick="sortBy('type')" id="th-type">סוג</th>
          <th onclick="sortBy('priority')" id="th-priority" class="col-priority">עדיפות</th>
          <th onclick="sortBy('status')" id="th-status">סטטוס</th>
          <th class="col-details">פרטים / מיקום</th>
          <th class="col-notes">הערות</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<button class="fab" onclick="openModal()">+</button>

<!-- Add/Edit Modal -->
<div class="modal-bg" id="modal" style="display:none" onclick="bgClose(event)">
  <div class="modal">
    <h2 id="modal-ttl">משימה חדשה</h2>
    <div class="form-grid">
      <div class="form-row">
        <label>תאריך יעד</label>
        <input type="date" id="f-date">
      </div>
      <div class="form-row">
        <label>עדיפות</label>
        <select id="f-priority">
          <option value="גבוה">גבוה</option>
          <option value="בינוני" selected>בינוני</option>
          <option value="נמוך">נמוך</option>
        </select>
      </div>
      <div class="form-row">
        <label>לקוח</label>
        <input type="text" id="f-client" placeholder="שם הלקוח">
      </div>
      <div class="form-row">
        <label>סוג לקוח</label>
        <select id="f-type">
          <option value="מכאן">מכאן</option>
          <option value="פרטי">פרטי</option>
        </select>
      </div>
      <div class="form-row">
        <label>סטטוס</label>
        <select id="f-status">
          <option value="לא בוצע">לא בוצע</option>
          <option value="בוצע">בוצע</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <label>פרטים / מיקום המשימה</label>
      <input type="text" id="f-details" placeholder="למשל: תיק X, Drive/תיקיות/2026, אימייל...">
    </div>
    <div class="form-row">
      <label>הערות</label>
      <textarea id="f-notes" placeholder="הערות נוספות..."></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">ביטול</button>
      <button class="btn-save" onclick="saveTask()">שמירה</button>
    </div>
  </div>
</div>

<!-- Confirm Delete Modal -->
<div class="modal-bg" id="confirm-modal" style="display:none">
  <div class="confirm-modal">
    <h3>מחיקת משימה</h3>
    <p>האם למחוק את המשימה של <strong id="confirm-name"></strong>?</p>
    <div style="display:flex;gap:8px;justify-content:center">
      <button class="btn-cancel" onclick="document.getElementById('confirm-modal').style.display='none'">ביטול</button>
      <button class="btn-save" style="background:#E24B4A" id="confirm-yes">מחק</button>
    </div>
  </div>
</div>

<script>
const STORE = 'tasks_v2';
let tasks = [];
let editId = null;
let sortField = 'date';
let sortAsc = true;

function load(){
  try{ tasks = JSON.parse(localStorage.getItem(STORE)||'[]'); }
  catch(e){ tasks=[]; }
  if(!tasks.length) seed();
}

function seed(){
  tasks = [
    {id:uid(),date:'2026-04-28',client:'אבי לוי',type:'פרטי',priority:'גבוה',status:'לא בוצע',details:'תיק מכירת נכס — Drive/תיקיות/2026',notes:'לשלוח מסמכים עד סוף שבוע'},
    {id:uid(),date:'2026-04-30',client:'מכאן ירושלים',type:'מכאן',priority:'בינוני',status:'לא בוצע',details:'חוזה שכירות — מייל לאחשגר',notes:''},
    {id:uid(),date:'2026-04-25',client:'שרה כהן',type:'פרטי',priority:'נמוך',status:'בוצע',details:'ייפוי כוח נוטריוני',notes:'הושלם ונחתם'},
    {id:uid(),date:'2026-05-05',client:'מכאן תל אביב',type:'מכאן',priority:'גבוה',status:'לא בוצע',details:'עתירה לבית משפט — Asana Task #441',notes:'תאריך דיון: 15/05'}
  ];
  save();
}

function save(){ localStorage.setItem(STORE, JSON.stringify(tasks)); }
function uid(){ return Date.now() + Math.random().toString(36).slice(2); }

const today = new Date().toISOString().slice(0,10);

function isLate(t){ return t.status==='לא בוצע' && t.date && t.date < today; }

function render(){
  const q = document.getElementById('q').value.toLowerCase();
  const fs = document.getElementById('fs').value;
  const ft = document.getElementById('ft').value;
  const fp = document.getElementById('fp').value;
  const pm = {גבוה:0,בינוני:1,נמוך:2};

  let list = tasks.filter(t=>{
    if(fs && t.status!==fs) return false;
    if(ft && t.type!==ft) return false;
    if(fp && t.priority!==fp) return false;
    if(q){
      const hay = [(t.client||''),(t.details||''),(t.notes||'')].join(' ').toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });

  list.sort((a,b)=>{
    let va = sortField==='priority' ? (pm[a.priority]??1) : (a[sortField]||'');
    let vb = sortField==='priority' ? (pm[b.priority]??1) : (b[sortField]||'');
    return (va<vb?-1:va>vb?1:0) * (sortAsc?1:-1);
  });

  // update sort headers
  ['date','client','type','priority','status'].forEach(f=>{
    const el = document.getElementById('th-'+f);
    if(el){ el.className = sortField===f ? (sortAsc?'sort-asc':'sort-desc') : (f==='priority'?'col-priority':''); }
  });

  const tbody = document.getElementById('tbody');
  if(!list.length){
    tbody.innerHTML = '<tr><td colspan="8" class="empty">אין משימות מתאימות</td></tr>';
  } else {
    tbody.innerHTML = list.map(t=>{
      const late = isLate(t);
      const dateStr = t.date ? new Date(t.date+'T12:00').toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit',year:'2-digit'}) : '—';
      const tc = t.type==='מכאן'?'b-agency':'b-private';
      const pc = t.priority==='גבוה'?'b-high':t.priority==='בינוני'?'b-med':'b-low';
      const pdot = t.priority==='גבוה'?'pdot-h':t.priority==='בינוני'?'pdot-m':'pdot-l';
      const sc = t.status==='בוצע'?'b-done':'b-pend';
      return `<tr class="${late?'overdue':''}">
        <td class="${late?'date-late':''}">${dateStr}${late?' ⚠':''}</td>
        <td style="font-weight:500">${esc(t.client)||'—'}</td>
        <td><span class="badge ${tc}">${t.type}</span></td>
        <td class="col-priority"><span class="badge ${pc}"><span class="pdot ${pdot}"></span>${t.priority}</span></td>
        <td><span class="badge ${sc} badge-toggle" onclick="toggle('${t.id}')" title="לחץ לשינוי סטטוס">${t.status}</span></td>
        <td class="details-cell col-details" title="${esc(t.details)||''}">${esc(t.details)||'—'}</td>
        <td class="notes-cell col-notes" title="${esc(t.notes)||''}">${esc(t.notes)||'—'}</td>
        <td><div class="act">
          <button class="btn-edit" onclick="editTask('${t.id}')">עריכה</button>
          <button class="btn-del" onclick="confirmDelete('${t.id}')">✕</button>
        </div></td>
      </tr>`;
    }).join('');
  }

  // stats — always from full list
  document.getElementById('s-total').textContent = tasks.length;
  document.getElementById('s-done').textContent  = tasks.filter(t=>t.status==='בוצע').length;
  document.getElementById('s-pend').textContent  = tasks.filter(t=>t.status==='לא בוצע').length;
  document.getElementById('s-late').textContent  = tasks.filter(isLate).length;
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function sortBy(f){
  sortAsc = sortField===f ? !sortAsc : true;
  sortField = f;
  render();
}

function toggle(id){
  const t = tasks.find(x=>x.id===id);
  if(t){ t.status = t.status==='בוצע'?'לא בוצע':'בוצע'; save(); render(); }
}

function confirmDelete(id){
  const t = tasks.find(x=>x.id===id);
  if(!t) return;
  document.getElementById('confirm-name').textContent = t.client||'משימה זו';
  document.getElementById('confirm-yes').onclick = ()=>{
    tasks = tasks.filter(x=>x.id!==id);
    save(); render();
    document.getElementById('confirm-modal').style.display='none';
  };
  document.getElementById('confirm-modal').style.display='flex';
}

function openModal(reset=true){
  if(reset){
    editId=null;
    document.getElementById('modal-ttl').textContent='משימה חדשה';
    document.getElementById('f-date').value = today;
    document.getElementById('f-client').value='';
    document.getElementById('f-type').value='מכאן';
    document.getElementById('f-priority').value='בינוני';
    document.getElementById('f-status').value='לא בוצע';
    document.getElementById('f-details').value='';
    document.getElementById('f-notes').value='';
  }
  document.getElementById('modal').style.display='flex';
  setTimeout(()=>document.getElementById('f-client').focus(),100);
}

function closeModal(){ document.getElementById('modal').style.display='none'; }

function bgClose(e){ if(e.target===document.getElementById('modal')) closeModal(); }

function editTask(id){
  const t=tasks.find(x=>x.id===id);
  if(!t) return;
  editId=id;
  document.getElementById('modal-ttl').textContent='עריכת משימה';
  document.getElementById('f-date').value=t.date||'';
  document.getElementById('f-client').value=t.client||'';
  document.getElementById('f-type').value=t.type||'מכאן';
  document.getElementById('f-priority').value=t.priority||'בינוני';
  document.getElementById('f-status').value=t.status||'לא בוצע';
  document.getElementById('f-details').value=t.details||'';
  document.getElementById('f-notes').value=t.notes||'';
  openModal(false);
}

function saveTask(){
  const client = document.getElementById('f-client').value.trim();
  if(!client){ alert('יש למלא שם לקוח'); return; }
  const t={
    id: editId || uid(),
    date: document.getElementById('f-date').value,
    client,
    type: document.getElementById('f-type').value,
    priority: document.getElementById('f-priority').value,
    status: document.getElementById('f-status').value,
    details: document.getElementById('f-details').value.trim(),
    notes: document.getElementById('f-notes').value.trim()
  };
  if(editId) tasks = tasks.map(x=>x.id===editId?t:x);
  else tasks.push(t);
  save(); closeModal(); render();
}

// Date header
document.getElementById('hdate').textContent = new Date().toLocaleDateString('he-IL',{weekday:'long',day:'numeric',month:'long'});

load();
render();
</script>
</body>
</html>
